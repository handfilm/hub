<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data Fetch Example</title>
    <style>
        /* CSS: হাই-কন্ট্রাস্ট, ভয়েড-ব্ল্যাক এবং র-ইন্ডাস্ট্রিয়াল স্টাইল */
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #dashboard-module {
            border: 2px solid #FFFFFF;
            padding: 25px;
            width: 350px;
            text-transform: uppercase;
            box-shadow: 6px 6px 0px #FF0000;
        }
        .data-label {
            color: #888888;
            font-size: 12px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .data-value {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #FFFFFF;
        }
        button {
            background-color: #FF0000;
            color: #FFFFFF;
            border: none;
            padding: 12px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            letter-spacing: 2px;
        }
        button:hover {
            background-color: #FFFFFF;
            color: #000000;
        }
    </style>
</head>
<body>

<div id="dashboard-module">
    <div class="data-label">System Status:</div>
    <div class="data-value" id="status">Awaiting Action...</div>
    
    <div class="data-label">Fetched Name:</div>
    <div class="data-value" id="name">---</div>

    <button onclick="fetchData()">Initialize Fetch</button>
</div>

<script>
    async function fetchData() {
        // DOM থেকে নির্দিষ্ট এলিমেন্টগুলো খুঁজে বের করা
        const statusEl = document.getElementById('status');
        const nameEl = document.getElementById('name');
        
        statusEl.innerText = "Connecting to API...";
        statusEl.style.color = "#FFFF00"; // প্রসেসিং বোঝাতে হলুদ রং
        
        try {
            // ১. API থেকে ডেটা রিকোয়েস্ট (GET Method)
            const response = await fetch('https://jsonplaceholder.typicode.com/users/1');
            
            // ২. আসা টেক্সটকে JSON অবজেক্টে পার্স করা
            const data = await response.json();
            
            // ৩. DOM Manipulation (পেজ রিলোড ছাড়াই স্ক্রিনে ডেটা বসিয়ে দেওয়া)
            nameEl.innerText = data.name;
            
            statusEl.innerText = "Data Retrieved";
            statusEl.style.color = "#00FF00"; // সাকসেস বোঝাতে সবুজ রং
            
        } catch (error) {
            // কোনো এরর হলে সেটা হ্যান্ডেল করা
            statusEl.innerText = "Connection Failed";
            statusEl.style.color = "#FF0000";
        }
    }
</script>

</body>
</html>
