<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#080808">
<title>H&H // MASTER HUB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   TOKENS — same system as BLOOM OS / RAWx tools
══════════════════════════════════════════════ */
:root{
  --bg:#080808; --bg1:#0d0d0d; --bg2:#121212; --bg3:#181818;
  --e1:#222; --e2:#2a2a2a; --e3:#383838;
  --tx:#efefef; --tx2:#a8a8a8; --tx3:#606060; --tx4:#383838;
  --gold:#f5a623; --gold2:#c47d00; --gold-d:#1a0e00;
  --red:#C41230; --red2:#ff3535;
  --green:#39ff14;
  --mono:'DM Mono',monospace; --disp:'Bebas Neue',sans-serif;
  --e:cubic-bezier(.16,1,.3,1); --r:3px; --r2:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--mono);overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold2)}

/* scanline overlay */
#scan{position:fixed;inset:0;pointer-events:none;z-index:999;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.015) 0px,rgba(255,255,255,.015) 1px,transparent 1px,transparent 3px);mix-blend-mode:overlay}

/* ═══ HEADER ═══ */
header{padding:56px 24px 28px;border-bottom:1px solid var(--e1);position:relative}
.eyebrow{font-size:8px;letter-spacing:.5em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:10px;margin-bottom:14px}
.eyebrow::before{content:'';width:26px;height:1px;background:var(--gold)}
h1{font-family:var(--disp);font-size:clamp(40px,9vw,84px);line-height:.88;letter-spacing:.03em}
h1 span{color:var(--gold)}
.sub{font-size:11px;color:var(--tx3);letter-spacing:1.5px;margin-top:12px;max-width:520px;line-height:1.6}

/* ═══ SEARCH ═══ */
.search-wrap{padding:20px 24px;position:sticky;top:0;background:rgba(8,8,8,.92);backdrop-filter:blur(10px);z-index:50;border-bottom:1px solid var(--e1)}
.search-inner{max-width:1400px;margin:0 auto;position:relative}
#hubSearch{width:100%;padding:12px 16px 12px 38px;background:var(--bg2);border:1px solid var(--e2);color:var(--tx);font-family:var(--mono);font-size:12px;border-radius:var(--r);outline:none;letter-spacing:.5px}
#hubSearch:focus{border-color:var(--gold2);box-shadow:0 0 0 2px rgba(245,166,35,.08)}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:13px;pointer-events:none}
#hubCount{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--tx3);letter-spacing:1.5px}

/* ═══ SECTIONS ═══ */
main{max-width:1400px;margin:0 auto;padding:8px 24px 80px}
.section{margin-top:52px}
.section-head{display:flex;align-items:baseline;gap:14px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--e1)}
.section-title{font-family:var(--disp);font-size:clamp(24px,3.4vw,36px);letter-spacing:.04em;line-height:1}
.section-count{font-size:9px;color:var(--tx3);letter-spacing:2px}
.section-desc{font-size:9.5px;color:var(--tx3);letter-spacing:1px;margin:-14px 0 20px}

/* ═══ CARD GRID ═══ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.card{position:relative;background:var(--bg2);border:1px solid var(--e1);border-radius:var(--r2);text-decoration:none;color:var(--tx);display:flex;flex-direction:column;transition:border-color .4s var(--e),transform .4s var(--e),box-shadow .4s var(--e);overflow:hidden;will-change:transform}
.card:hover{border-color:var(--accent,var(--e3));transform:translateY(-6px) scale(1.015);box-shadow:0 20px 48px rgba(0,0,0,.6),0 0 0 1px var(--accent,var(--e3))}
.card-accent{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--gold));opacity:0;transition:opacity .3s;z-index:2}
.card:hover .card-accent{opacity:1}

/* thumbnail — taller vertical crop, fits full-page mobile screenshots better */
.card-thumb{position:relative;width:100%;aspect-ratio:3/4;background:var(--bg3);overflow:hidden;flex-shrink:0}
.card-thumb img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;opacity:0;transition:opacity .4s,transform .6s var(--e);transform:scale(1.001)}
.card-thumb img.loaded{opacity:1}
.card:hover .card-thumb img{transform:scale(1.08)}
.card-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,8,.9) 0%,rgba(8,8,8,.15) 35%,transparent 60%);opacity:.7;transition:opacity .4s;z-index:1;pointer-events:none}
.card:hover .card-thumb::after{opacity:.4}
.card-thumb-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg3),var(--bg1));font-family:var(--disp);font-size:56px;letter-spacing:.04em;color:color-mix(in srgb, var(--accent,var(--gold)) 35%, var(--tx4));transition:transform .5s var(--e)}
.card:hover .card-thumb-fallback{transform:scale(1.06)}
.card-thumb-fallback.hidden{display:none}
.card-badge{position:absolute;top:10px;left:10px;font-size:7.5px;letter-spacing:2px;text-transform:uppercase;color:var(--accent,var(--gold));background:rgba(8,8,8,.75);border:1px solid var(--accent,var(--gold2));padding:3px 8px;border-radius:20px;white-space:nowrap;z-index:2;backdrop-filter:blur(4px);transition:transform .3s var(--e),background .3s}
.card:hover .card-badge{transform:translateY(-2px);background:var(--accent,var(--gold-d))}
.card-arrow{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;background:rgba(8,8,8,.75);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--tx3);transition:color .3s,transform .35s var(--e),background .3s;z-index:2;backdrop-filter:blur(4px)}
.card:hover .card-arrow{color:#000;background:var(--accent,var(--gold));transform:translate(3px,-3px) rotate(45deg)}

.card-body{padding:18px 18px 20px;display:flex;flex-direction:column;gap:7px;flex:1}
.card-title{font-family:var(--disp);font-size:24px;letter-spacing:.03em;line-height:1.05;transition:color .3s}
.card:hover .card-title{color:var(--accent,var(--gold))}
.card-desc{font-size:10px;color:var(--tx3);letter-spacing:.5px;line-height:1.6;flex:1}
.card-url{font-size:8px;color:var(--tx4);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-top:1px solid var(--e1);padding-top:9px;margin-top:2px;transition:border-color .3s}
.card:hover .card-url{border-color:var(--accent,var(--e2))}

.empty-msg{font-size:10px;color:var(--tx4);letter-spacing:2px;text-transform:uppercase;padding:30px 0;text-align:center}

/* footer */
footer{padding:30px 24px 50px;border-top:1px solid var(--e1);text-align:center;font-size:8.5px;letter-spacing:2px;color:var(--tx4);text-transform:uppercase}

@media(max-width:640px){
  header{padding:40px 18px 22px}
  .search-wrap{padding:16px 18px}
  main{padding:8px 18px 60px}
  .grid{grid-template-columns:1fr 1fr;gap:12px}
  .card-body{padding:13px 13px 15px}
  .card-title{font-size:18px}
  .card:hover{transform:translateY(-3px) scale(1.01)}
}
</style>
</head>
<body>
<div id="scan"></div>

<header>
  <div class="eyebrow">H&amp;H · NEXUS</div>
  <h1>MASTER <span>HUB</span></h1>
  <div class="sub">Every brand, tool, and prototype in one place. Sections are pulled from a single data array in this file — add a link by adding one line, no HTML editing required.</div>
</header>

<div class="search-wrap">
  <div class="search-inner">
    <span class="search-ico">⌕</span>
    <input id="hubSearch" type="text" placeholder="Search all links…" oninput="renderHub()">
    <span id="hubCount"></span>
  </div>
</div>

<main id="hubMain"></main>

<footer>H&amp;H NEXUS — LOCAL FIRST — NO BACKEND</footer>

<script>
/* ══════════════════════════════════════════════
   SCREENSHOT SERVICE
   Auto-generates a live thumbnail for any public URL
   via a free screenshot-as-a-service endpoint — no
   API key, no server. Swap SCREENSHOT_BASE for a
   different provider if this one goes down/rate-limits.
   Won't work on localhost/relative URLs or pages that
   require login (most Shopify admin/password pages) —
   those just fall back to the initial-letter tile.
══════════════════════════════════════════════ */
const SCREENSHOT_BASE = 'https://image.thum.io/get/width/640/crop/400/noanimate/';
function screenshotUrl(pageUrl){ return SCREENSHOT_BASE + pageUrl; }

/* ══════════════════════════════════════════════
   DATA — this is the only part you need to edit.
   Add a new link: copy a {} block inside the right
   section's `links` array. Add a new section: copy
   a whole {title, desc, accent, links:[...]} block.

   Per-link fields:
     name    required
     url     required
     desc    optional, short line under the title
     badge   optional, small tag e.g. 'SHOPIFY'
     thumb   optional — provide your own image path
             (e.g. 'assets/thumbs/rawx.jpg') to override
             the auto screenshot
     noThumb optional — set true to always show the
             plain letter tile (skip screenshot entirely)

   accent accepts any CSS color, e.g. '#f5a623'
══════════════════════════════════════════════ */
const HUB = [
  {
    title: 'HANDFILM',
    desc: 'Creative studio — cinematic video, AI workflow education.',
    accent: '#f5a623',
    links: [
      { name: 'HANDFILM Home', url: 'https://handfilm.myshopify.com', desc: 'Main storefront — masterclass, AI apparel drops', badge: 'SHOPIFY', thumb: 'assets/thumbs/handfilm-home.jpg' },
      { name: 'HANDFILM Page', url: 'https://handfilm.myshopify.com/pages/handfilm', desc: 'Brand page', badge: 'SHOPIFY' },
    ]
  },
  {
    title: 'RAWx',
    desc: 'Editorial AI fashion photography, headless OS, brutalist archive.',
    accent: '#ff3535',
    links: [
      { name: 'RAWx Master OS', url: 'https://handfilm.myshopify.com/pages/rawx-master-os', desc: 'The Machine Is Alive — Gemini/Drive/Make pipeline control', badge: 'SHOPIFY', thumb: 'assets/thumbs/rawx-master-os.jpg' },
      { name: 'RAWx AI Studio', url: 'https://handfilm.myshopify.com/pages/rawx-ai-studio', desc: 'Archive · Vault · Cinema — RAWx image gallery', badge: 'SHOPIFY', thumb: 'assets/thumbs/rawx-ai-studio.jpg' },
    ]
  },
  {
    title: 'HANDSANDHEAD',
    desc: '20-year e-commerce operation — sourcing, RMG exports, physical goods.',
    accent: '#39ff14',
    links: [
      { name: 'Hands & Head Store', url: 'https://handfilm.myshopify.com/pages/handsandhead', desc: 'All / Women / Sandal / RAWx / Football', badge: 'SHOPIFY', thumb: 'assets/thumbs/handsandhead-store.jpg' },
      { name: 'RMG Manufacturer', url: 'https://handfilm.github.io/rmg', desc: 'Premium apparel built in Bangladesh — knitwear/woven/activewear/lingerie', badge: 'GH PAGES', thumb: 'assets/thumbs/rmg.png' },
      { name: 'ArutéMika Leather', url: 'https://handfilm.github.io/arutemika-eu', desc: 'Genuine leather, European standards — bags, cases, wallets', badge: 'GH PAGES', thumb: 'assets/thumbs/arutemika.jpg' },
    ]
  },
  {
    title: 'TOOLS / OS',
    desc: 'Internal apps — trackers, dashboards, production tools.',
    accent: '#b06fff',
    links: [
      { name: 'BLOOM OS', url: 'index.html', desc: 'Content library & production tracker', badge: 'INTERNAL' },
    ]
  },
  {
    title: 'RAWxOS — ROOT PAGES',
    desc: 'Local prototype pages, Spck editor root directory.',
    accent: '#f5a623',
    links: [
      { name: 'RAWx Home', url: 'index.html', desc: 'Bodysuits · Sets · Essentials · Activewear — main storefront', badge: 'LOCAL', thumb: 'assets/thumbs/rawx-home.jpg' },
      { name: 'RAWx Denim', url: 'index-denim.html', desc: 'High-Tension Indigo — Skin-Bind fit, raw-hem selvedge', badge: 'LOCAL', thumb: 'assets/thumbs/rawx-denim.jpg' },
      { name: 'RAWx Jute', url: 'index-jute.html', desc: '17 reference SKUs — bags, rugs, matting, twine, home textiles', badge: 'LOCAL', thumb: 'assets/thumbs/rawx-jute.jpg' },
      { name: 'RAWx Home Textiles Terminal', url: 'index-textiles.html', desc: 'Ten SKU families, one terminal — OEKO-TEX/GOTS wholesale', badge: 'LOCAL', thumb: 'assets/thumbs/rawx-textiles.jpg' },
      { name: 'RAWx B2B — Storefront vs Wholesale', url: 'index-b2b.html', desc: 'Drag-to-compare — D2C storefront vs wholesale terminal', badge: 'LOCAL', thumb: 'assets/thumbs/rawx-b2b.jpg' },
      { name: 'RMG Home', url: 'rmg-home.html', desc: 'RAWx // Engine — B2B commercial image protocol', badge: 'LOCAL', thumb: 'assets/thumbs/rmg-home.jpg' },
      { name: 'HANDFILM Tutorial Pack 2', url: 'handfilm-tutorial-pack-2.html', desc: 'Zero Friction Video Extraction — 60-min brutalist workflow', badge: 'LOCAL', thumb: 'assets/thumbs/handfilm-tutorial.jpg' },
      { name: 'Field Notes — Rakib Himon', url: 'index-article.html', desc: 'The Distributed Architecture — building a 4-app ecosystem', badge: 'LOCAL', thumb: 'assets/thumbs/rakib-article.jpg' },
    ]
  },
];

/* ══════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════ */
function renderHub(){
  const q = (document.getElementById('hubSearch').value || '').trim().toLowerCase();
  const main = document.getElementById('hubMain');
  let totalShown = 0, totalAll = 0;
  main.innerHTML = HUB.map(section => {
    const filtered = section.links.filter(l => {
      totalAll++;
      if(!q) return true;
      return (l.name+' '+(l.desc||'')+' '+(section.title)).toLowerCase().includes(q);
    });
    totalShown += filtered.length;
    if(q && !filtered.length) return '';
    const cards = filtered.length
      ? filtered.map(l => {
          const isExternal = l.url.startsWith('http');
          const initial = esc(l.name.trim().charAt(0).toUpperCase() || '?');
          const thumbSrc = l.noThumb ? null : (l.thumb || (isExternal ? screenshotUrl(l.url) : null));
          const thumbImg = thumbSrc
            ? `<img src="${esc(thumbSrc)}" loading="lazy" onload="this.classList.add('loaded');this.previousElementSibling.classList.add('hidden')" onerror="this.style.display='none'">`
            : '';
          return `
        <a class="card" href="${esc(l.url)}" target="${isExternal?'_blank':'_self'}" rel="noopener" style="--accent:${section.accent}">
          <div class="card-accent"></div>
          <div class="card-thumb">
            <div class="card-thumb-fallback">${initial}</div>
            ${thumbImg}
            <span class="card-badge">${esc(l.badge||'LINK')}</span>
            <span class="card-arrow">↗</span>
          </div>
          <div class="card-body">
            <div class="card-title">${esc(l.name)}</div>
            <div class="card-desc">${esc(l.desc||'')}</div>
            <div class="card-url">${esc(l.url.replace(/^https?:\/\//,''))}</div>
          </div>
        </a>`;
        }).join('')
      : '<div class="empty-msg">No links yet — add one in the HUB data array</div>';
    return `
      <div class="section">
        <div class="section-head">
          <div class="section-title">${esc(section.title)}</div>
          <div class="section-count">${filtered.length} LINK${filtered.length===1?'':'S'}</div>
        </div>
        <div class="section-desc">${esc(section.desc||'')}</div>
        <div class="grid">${cards}</div>
      </div>`;
  }).join('') || '<div class="empty-msg">No matches</div>';
  document.getElementById('hubCount').textContent = q ? `${totalShown} MATCH${totalShown===1?'':'ES'}` : '';
}
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

renderHub();
</script>
</body>
</html>
