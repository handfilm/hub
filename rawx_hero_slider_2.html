<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAWx — Access Terminal</title>
<style>
  :root{
    --void:#050607;
    --void-2:#0B0D0E;
    --cyan:#5FF3E0;
    --cyan-dim:#2C7A72;
    --amber:#FFB020;
    --steel:#7C8790;
    --line: rgba(255,255,255,.09);
    --paper:#E7ECEE;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%;
    background:var(--void);
    overflow:hidden;
    font-family:'JetBrains Mono', ui-monospace, 'SF Mono', Consolas, monospace;
  }

  .stage{
    position:relative;
    width:100vw;
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }

  /* ---------- SLIDES ---------- */
  .slide{
    position:absolute; inset:0;
    opacity:0; visibility:hidden;
    z-index:1;
  }
  .slide.active{
    opacity:1; visibility:visible;
    z-index:2;
    animation: settle 700ms steps(6) both;
  }
  .slide.leaving{
    z-index:3;
    animation: glitchOut 380ms steps(4) both;
  }

  @keyframes settle{
    0%{ clip-path: inset(0 0 100% 0); filter:brightness(2) saturate(0); }
    12%{ clip-path: inset(0 0 0 0); filter:brightness(2) saturate(0); }
    18%{ clip-path: inset(40% 0 40% 0); }
    26%{ clip-path: inset(0 0 0 0); }
    40%{ filter:brightness(1) saturate(1); }
    100%{ filter:brightness(1) saturate(1); clip-path: inset(0 0 0 0); }
  }
  @keyframes glitchOut{
    0%{ opacity:1; transform:translateX(0); }
    30%{ opacity:1; transform:translateX(-6px); }
    60%{ opacity:.6; transform:translateX(8px); }
    100%{ opacity:0; transform:translateX(0); }
  }

  .slide__media{ position:absolute; inset:0; overflow:hidden; }
  .slide__media img{
    width:100%; height:100%;
    object-fit:cover;
    object-position:50% 12%;
    filter:grayscale(55%) contrast(1.15) brightness(.72);
    transform:scale(1.08);
    transition:transform 8000ms linear, filter 900ms ease;
  }
  .slide.active .slide__media img{ transform:scale(1.0); }
  .slide.active .slide__media img{ filter:grayscale(20%) contrast(1.12) brightness(.82); }

  .tint{
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(5,6,7,.05) 0%, rgba(5,6,7,.15) 35%, rgba(5,6,7,.55) 68%, rgba(5,6,7,.96) 100%),
               linear-gradient(90deg, rgba(5,6,7,.75) 0%, rgba(5,6,7,0) 40%, rgba(5,6,7,0) 62%, rgba(5,6,7,.55) 100%);
  }
  .tint-cyan{
    position:absolute; inset:0;
    background:radial-gradient(circle at 82% 18%, rgba(95,243,224,.10), transparent 42%);
    mix-blend-mode:screen;
  }

  .grid-overlay{
    position:absolute; inset:0;
    pointer-events:none;
    opacity:.14;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:48px 48px;
  }

  .scanline{
    position:absolute; inset:0; pointer-events:none; z-index:25;
    background:repeating-linear-gradient(180deg, rgba(255,255,255,.03) 0px, rgba(255,255,255,.03) 1px, transparent 1px, transparent 3px);
    opacity:.5;
  }
  .sweep{
    position:absolute; left:0; right:0; height:120px; z-index:24;
    background:linear-gradient(180deg, transparent, rgba(95,243,224,.06), transparent);
    top:-120px;
    animation: sweepMove 5200ms linear infinite;
    pointer-events:none;
  }
  @keyframes sweepMove{
    0%{ top:-120px; }
    100%{ top:100%; }
  }

  /* ---------- HUD CORNERS ---------- */
  .hud-corner{
    position:absolute; width:26px; height:26px; z-index:22; pointer-events:none;
    border-color:var(--cyan);
    opacity:.55;
  }
  .hc-tl{ top:18px; left:18px; border-top:2px solid; border-left:2px solid; }
  .hc-tr{ top:18px; right:18px; border-top:2px solid; border-right:2px solid; }
  .hc-bl{ bottom:18px; left:18px; border-bottom:2px solid; border-left:2px solid; }
  .hc-br{ bottom:18px; right:18px; border-bottom:2px solid; border-right:2px solid; }

  /* ---------- TOP STATUS BAR ---------- */
  .topbar{
    position:absolute; top:0; left:0; right:0; z-index:30;
    display:flex; align-items:center; justify-content:space-between;
    padding:28px clamp(20px,4vw,52px) 0;
  }
  .brandmark{
    color:var(--paper); font-weight:700; letter-spacing:.03em; font-size:15px;
    display:flex; align-items:center; gap:8px;
  }
  .brandmark .x{ color:var(--cyan); }
  .status-pill{
    display:flex; align-items:center; gap:8px;
    color:var(--cyan);
    font-size:11px; letter-spacing:.2em; text-transform:uppercase;
  }
  .status-pill .led{
    width:7px; height:7px; border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 8px var(--cyan);
    animation: blink 1.6s ease-in-out infinite;
  }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.25;} }

  .track-ticks{
    display:flex; gap:6px;
  }
  .tick{
    width:26px; height:3px;
    background:rgba(255,255,255,.16);
    position:relative;
    overflow:hidden;
  }
  .tick i{
    position:absolute; inset:0; width:0%;
    background:var(--cyan);
  }
  .tick.active{ background:rgba(255,255,255,.3); }

  /* ---------- CONTENT ---------- */
  .content{
    position:relative; z-index:20; height:100%;
    display:flex; flex-direction:column; justify-content:flex-end;
    padding:clamp(20px,4vw,52px);
    padding-bottom:clamp(84px,9vh,110px);
  }

  .logline{
    display:flex; align-items:center; gap:10px;
    color:var(--cyan);
    font-size:11.5px; letter-spacing:.22em; text-transform:uppercase;
    margin-bottom:16px;
    min-height:16px;
    opacity:0;
  }
  .slide.active .logline{ opacity:.9; animation: fadeUp 600ms ease 260ms both; }
  .logline::before{ content:'>'; color:var(--amber); }
  .logline .cursor{
    display:inline-block; width:7px; height:13px; background:var(--cyan);
    animation: blink 900ms steps(1) infinite;
  }

  .id-tag{
    color:var(--steel); font-size:11px; letter-spacing:.15em;
    margin-bottom:10px; opacity:0;
  }
  .slide.active .id-tag{ opacity:.7; animation: fadeUp 600ms ease 120ms both; }

  .headline{
    font-family: 'Arial Narrow', 'Helvetica Neue', Arial, sans-serif;
    font-weight:900;
    text-transform:uppercase;
    color:var(--paper);
    line-height:.86;
    letter-spacing:-.005em;
    font-size:clamp(46px, 9.2vw, 142px);
    max-width:20ch;
  }
  .headline .row{ overflow:hidden; }
  .headline span{
    display:block;
    transform:translateY(100%);
    transition:transform 780ms cubic-bezier(.16,.9,.2,1);
  }
  .slide.active .headline span{ transform:translateY(0); }
  .headline .row:nth-child(2) span{ transition-delay:70ms; color:var(--cyan); }

  .caption{
    margin-top:22px; max-width:44ch;
    color:var(--steel);
    font-size:clamp(13px,1.1vw,15.5px);
    line-height:1.65;
    opacity:0;
  }
  .slide.active .caption{ opacity:1; animation: fadeUp 700ms ease 460ms both; }
  .caption b{ color:var(--paper); font-weight:700; }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .cta-row{ margin-top:30px; display:flex; gap:16px; align-items:center; opacity:0; }
  .slide.active .cta-row{ opacity:1; animation: fadeUp 700ms ease 560ms both; }

  .cta{
    font-family:inherit; font-weight:700; font-size:11.5px; letter-spacing:.2em; text-transform:uppercase;
    padding:15px 24px; cursor:pointer; text-decoration:none;
    background:var(--cyan); color:var(--void); border:1px solid var(--cyan);
    display:inline-flex; align-items:center; gap:10px;
    transition:background 220ms ease, color 220ms ease;
  }
  .cta:hover{ background:transparent; color:var(--cyan); }
  .cta::after{ content:'▸'; }

  .cta-ghost{
    background:transparent; color:var(--paper);
    border:1px solid rgba(231,236,238,.3);
  }
  .cta-ghost:hover{ color:var(--paper); border-color:var(--paper); background:transparent; }
  .cta-ghost::after{ content:''; }

  /* ---------- TELEMETRY PANEL (bottom right) ---------- */
  .telemetry{
    position:absolute; right:clamp(20px,4vw,52px); bottom:clamp(84px,9vh,110px);
    z-index:20;
    text-align:right;
    display:none;
  }
  .telemetry .t-row{
    color:var(--steel); font-size:11px; letter-spacing:.1em;
    display:flex; justify-content:flex-end; gap:8px;
    margin-bottom:4px;
  }
  .telemetry .t-row b{ color:var(--cyan); font-weight:600; }

  /* ---------- BOTTOM BAR ---------- */
  .bottombar{
    position:absolute; left:0; right:0; bottom:0; z-index:30;
    display:flex; align-items:center; justify-content:space-between;
    padding:22px clamp(20px,4vw,52px);
    border-top:1px solid var(--line);
    background:linear-gradient(0deg, rgba(5,6,7,.6), transparent);
  }
  .counter{ color:var(--paper); font-size:12px; letter-spacing:.15em; display:flex; gap:6px; align-items:baseline;}
  .counter .cur{ color:var(--cyan); font-size:20px; font-weight:700; }
  .counter .sep,.counter .tot{ color:var(--steel); }

  .controls-cluster{ display:flex; gap:8px; align-items:center; }
  .icon-btn{
    width:42px; height:42px;
    border:1px solid rgba(231,236,238,.25);
    background:rgba(5,6,7,.4);
    color:var(--paper);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:14px;
    transition:border-color 200ms ease, color 200ms ease;
  }
  .icon-btn:hover{ border-color:var(--cyan); color:var(--cyan); }

  .side-label{
    position:absolute; left:clamp(14px,2.4vw,24px); top:50%; z-index:20;
    transform:translateY(-50%) rotate(180deg);
    writing-mode:vertical-rl;
    color:var(--steel); font-size:10.5px; letter-spacing:.3em; text-transform:uppercase;
    display:flex; align-items:center; gap:10px; pointer-events:none;
  }
  .side-label::after{ content:''; width:1px; height:50px; background:linear-gradient(var(--cyan), transparent); }

  @media (max-width:720px){
    .side-label{ display:none; }
    .telemetry{ display:none; }
    .caption{ display:none; }
    .cta-ghost{ display:none; }
    .content{ padding-bottom:110px; }
  }

  @media (prefers-reduced-motion: reduce){
    .slide, .headline span, .logline, .caption, .cta-row, .id-tag, .slide__media img, .sweep{
      animation:none !important; transition:none !important;
    }
  }

  button:focus-visible, .cta:focus-visible{ outline:2px solid var(--cyan); outline-offset:2px; }
</style>
</head>
<body>

<div class="stage" id="stage">

  <div class="side-label">RAWxOS · Field Archive</div>

  <header class="topbar">
    <div class="brandmark">RAW<span class="x">x</span> // TERMINAL</div>
    <div class="status-pill"><span class="led"></span> SYS.ONLINE</div>

  <div id="slides"></div>

  <div class="telemetry" id="telemetry">

    <div class="t-row">STATUS <b id="telStatus">—</b></div>
  </div>

  <footer class="bottombar">
    <div class="counter">
      <span class="cur" id="curNum">01</span><span class="sep">/</span><span class="tot" id="totNum">06</span>
    </div>
    <div class="track-ticks" id="tickRow"></div>
    <div class="controls-cluster">
      <button class="icon-btn" id="playPause" aria-label="Pause slideshow">❚❚</button>
      <button class="icon-btn" id="prevBtn" aria-label="Previous slide">←</button>
      <button class="icon-btn" id="nextBtn" aria-label="Next slide">→</button>
    </div>
  </footer>

  <div class="scanline"></div>
  <div class="sweep"></div>
</div>

const slidesRoot = document.getElementById('slides');
const tickRow = document.getElementById('tickRow');

SLIDES.forEach((s,i)=>{
  const el = document.createElement('section');
  el.className = 'slide' + (i===0 ? ' active' : '');
  el.id = 'slide-'+i;
  el.setAttribute('aria-hidden', i===0 ? 'false':'true');
  el.innerHTML = `
    <div class="slide__media"><img src="${s.img}" alt="${s.line1} ${s.line2} — RAWx"></div>
    <div class="tint"></div>
    <div class="tint-cyan"></div>
    <div class="grid-overlay"></div>
    <div class="hud-corner hc-tl"></div>
    <div class="hud-corner hc-tr"></div>
    <div class="hud-corner hc-bl"></div>
    <div class="hud-corner hc-br"></div>
    <div class="content">
      <div class="id-tag">${s.unit}</div>
      <div class="logline">${s.log}<span class="cursor"></span></div>
      <h1 class="headline">
        <div class="row"><span>${s.line1}</span></div>
        <div class="row"><span>${s.line2}</span></div>
      </h1>
      <p class="caption">${s.caption}</p>
      <div class="cta-row">
        <button class="cta" data-cta="primary">${s.ctaPrimary}</button>
        <button class="cta cta-ghost" data-cta="ghost">${s.ctaGhost}</button>
      </div>
    </div>
  `;
  slidesRoot.appendChild(el);

  const tick = document.createElement('div');
  tick.className = 'tick' + (i===0 ? ' active':'');
  tick.innerHTML = '<i></i>';
  tickRow.appendChild(tick);
});

document.getElementById('totNum').textContent = String(SLIDES.length).padStart(2,'0');

let current = 0, playing = true;
const DURATION = 6800;
let startTime = performance.now();

const slideEls = ()=>document.querySelectorAll('.slide');
const tickEls = ()=>document.querySelectorAll('.tick');
const tickBars = ()=>document.querySelectorAll('.tick i');
const curNum = document.getElementById('curNum');
const telId = document.getElementById('telId');
const telFabric = document.getElementById('telFabric');
const telStatus = document.getElementById('telStatus');

function goTo(index, resetTimer=true){
  const slides = slideEls();
  const prevIndex = current;
  current = (index + SLIDES.length) % SLIDES.length;

  slides.forEach((el,i)=>{
    if (i === prevIndex && i !== current){
      el.classList.add('leaving');
      setTimeout(()=> el.classList.remove('leaving'), 400);
    }
    el.classList.toggle('active', i === current);
    el.setAttribute('aria-hidden', i === current ? 'false':'true');
  });

  tickEls().forEach((el,i)=> el.classList.toggle('active', i===current));
  tickBars().forEach((el,i)=>{ el.style.width = i===current ? '0%' : (i<current ? '100%':'0%'); });

  curNum.textContent = String(current+1).padStart(2,'0');

  const s = SLIDES[current];
  telId.textContent = s.unit;
  telFabric.textContent = s.fabric;
  telStatus.textContent = s.status;

  if (resetTimer) startTime = performance.now();
}

function next(){ goTo(current+1); }
function prev(){ goTo(current-1); }

let rafId = null;
function tick(now){
  if (playing){
    const elapsed = now - startTime;
    const pct = Math.min(elapsed/DURATION, 1);
    tickBars()[current].style.width = (pct*100)+'%';
    if (elapsed >= DURATION) next();
  }
  rafId = requestAnimationFrame(tick);
}
rafId = requestAnimationFrame(tick);

document.getElementById('nextBtn').addEventListener('click', ()=>next());
document.getElementById('prevBtn').addEventListener('click', ()=>prev());

const playPauseBtn = document.getElementById('playPause');
playPauseBtn.addEventListener('click', ()=>{
  playing = !playing;
  playPauseBtn.textContent = playing ? '❚❚' : '▶';
  playPauseBtn.setAttribute('aria-label', playing ? 'Pause slideshow':'Play slideshow');
  if (playing) startTime = performance.now();
});

tickRow.addEventListener('click', (e)=>{
  const idx = Array.from(tickRow.children).indexOf(e.target.closest('.tick'));
  if (idx >= 0) goTo(idx);
});

document.addEventListener('keydown', (e)=>{
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
  if (e.key === ' '){ e.preventDefault(); playPauseBtn.click(); }
});

let touchX = null;
document.getElementById('stage').addEventListener('touchstart', e=>{ touchX = e.touches[0].clientX; }, {passive:true});
document.getElementById('stage').addEventListener('touchend', e=>{
  if (touchX===null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50){ dx>0 ? prev() : next(); }
  touchX = null;
}, {passive:true});

document.addEventListener('click', (e)=>{
  const cta = e.target.closest('[data-cta]');
  if (!cta) return;
  cta.style.transform = 'scale(0.97)';
  setTimeout(()=> cta.style.transform = '', 140);
});

// init
goTo(0, false);
document.getElementById('telemetry').style.display = 'block';
</script>

</body>
</html>
